name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-scan-push-deploy:
    runs-on: ubuntu-latest

    steps:
    # -------------------------
    # 1️⃣ Checkout Code
    # -------------------------
    - name: Checkout Code
      uses: actions/checkout@v4

    # -------------------------
    # 2️⃣ GitLeaks
    # -------------------------
    - name: Run GitLeaks
      uses: gitleaks/gitleaks-action@v2
      with:
        args: detect --source . --verbose

    # -------------------------
    # 3️⃣ SonarQube Scan
    # -------------------------
    - name: SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    # -------------------------
    # 4️⃣ Unit Tests
    # -------------------------
    - name: Run Python Unit Tests
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
        pytest --junitxml=test-results.xml

    # -------------------------
    # 5️⃣ Configure AWS
    # -------------------------
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # -------------------------
    # 6️⃣ Login to ECR
    # -------------------------
    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    # -------------------------
    # 7️⃣ Build Docker Image
    # -------------------------
    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.ECR_REPOSITORY }}:latest .

    # -------------------------
    # 8️⃣ Tag Image for ECR
    # -------------------------
    - name: Tag Image
      run: |
        docker tag ${{ secrets.ECR_REPOSITORY }}:latest \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

    # -------------------------
    # 9️⃣ Run Trivy Scan
    # -------------------------
    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@0.20.0
      with:
        image-ref: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest
        format: table
        exit-code: 1
        severity: CRITICAL,HIGH
        ignore-unfixed: true

    # -------------------------
    # 🔟 Push Image to ECR
    # -------------------------
    - name: Push Image to ECR
      run: |
        docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

    # -------------------------
    # 1️⃣1️⃣ Deploy to EC2
    # -------------------------
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Non-interactive ECR login
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          
          # Pull latest image
          docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest
          
          # Stop & remove old container
          docker stop students-app || true
          docker rm students-app || true
          
          # Run new container (map port 80 → 5000)
          docker run -d -p 80:5000 --name students-app \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

    # -------------------------
    # 1️⃣2️⃣ OWASP ZAP Baseline Scan
    # -------------------------
    - name: OWASP ZAP Baseline Scan
      id: zap-scan
      uses: zaproxy/action-baseline@v0.10.0
      with:
        target: 'http://3.109.121.101'        # EC2 public IP
        rules_file_name: '.zap/rules.tsv'
        cmd_options: '-a -r zap-baseline.html'

    # -------------------------
    # 1️⃣3️⃣ Upload ZAP Report
    # -------------------------
    - name: Upload ZAP Report
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: zap-baseline.html

    # -------------------------
    # 1️⃣4️⃣ Upload Unit Test Report
    # -------------------------
    - name: Upload Unit Test Results
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: unit-test-report
        path: test-results.xml
